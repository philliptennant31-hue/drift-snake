<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>drift — a cozy snake game</title>
<meta name="description" content="A cozy little snake game. Zen mode, daily challenges, ghost racing, unlockable snakes, and a generative lofi soundtrack.">
<meta name="theme-color" content="#f4efe7">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<meta property="og:title" content="drift — a cozy snake game">
<meta property="og:description" content="Zen mode, daily challenges, ghost racing, unlockable snakes, and a generative lofi soundtrack.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://philliptennant31-hue.github.io/drift-snake/">
<meta property="og:image" content="https://philliptennant31-hue.github.io/drift-snake/social-card.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=13">
</head>
<body>

<div class="topbar">
  <div class="brand">drift · snake</div>
  <div class="spacer"></div>
  <div class="chip hidden" id="goalChip" title="Challenge goal">
    <span class="label">BEAT</span>
    <span id="goal">0</span>
  </div>
  <div class="chip hidden" id="timeChip" title="Time remaining">
    <span class="label">TIME</span>
    <span id="timeLeft">60</span>
  </div>
  <div class="chip" title="Fruit eaten">
    <svg width="15" height="15" viewBox="0 0 20 20"><circle cx="10" cy="11" r="7.5" fill="var(--fruit)"/><circle cx="7.5" cy="8.8" r="2" fill="#fff" opacity=".55"/><path d="M10 4.5 Q10.5 2 13 1.8 Q12.8 4.4 10 4.5" fill="var(--fruit-leaf)"/></svg>
    <span id="score">0</span>
  </div>
  <div class="chip" id="bestChip" title="Best score">
    <span class="label">BEST</span>
    <span id="best">0</span>
  </div>
  <button class="icon-btn" id="muteBtn" title="Toggle sound">
    <svg id="soundOn" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z" fill="currentColor" stroke="none"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
    <svg id="soundOff" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M11 5 6 9H2v6h4l5 4V5z" fill="currentColor" stroke="none"/><line x1="16" y1="9" x2="22" y2="15"/><line x1="22" y1="9" x2="16" y2="15"/></svg>
  </button>
</div>

<div class="stage">
  <canvas id="game"></canvas>
  <button class="icon-btn hidden" id="gardenBack" title="back to menu">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
  </button>

  <div class="overlay show" id="menu">
    <h1>drift</h1>
    <p>a cozy little snake game</p>
    <div class="note hidden" id="challengeNote"></div>

    <div class="tabs">
      <button class="tab active" data-tab="play">play</button>
      <button class="tab" data-tab="setup">setup</button>
      <button class="tab" data-tab="style">style</button>
      <button class="tab" data-tab="sound">sound</button>
      <button class="tab" data-tab="stats">stats</button>
    </div>

    <div class="tab-panel" id="tab-play">
      <div class="opt-row">
        <div class="label">mood</div>
        <div class="pills" data-group="mode">
          <button class="pill" data-v="classic" data-tip="walls and collisions · the classic game">classic</button>
          <button class="pill" data-v="zen" data-tip="wraps around · nothing can hurt you">zen</button>
          <button class="pill" data-v="rush" data-tip="every fruit is timed · points = seconds left">rush</button>
          <button class="pill" data-v="trial" data-tip="best score in 60 seconds">trial</button>
        </div>
      </div>
      <button class="play-btn" id="playBtn">play</button>
      <button class="play-btn small daily" id="dailyBtn" data-tip="the same board for everyone, every day">daily</button>
    </div>

    <div class="tab-panel hidden" id="tab-setup">
      <div class="opt-row">
        <div class="label">pace</div>
        <div class="pills" data-group="pace">
          <button class="pill" data-v="slow">drift</button>
          <button class="pill" data-v="normal">stroll</button>
          <button class="pill" data-v="fast">scurry</button>
        </div>
      </div>
      <div class="opt-row">
        <div class="label">board</div>
        <div class="pills" data-group="size">
          <button class="pill" data-v="small">snug</button>
          <button class="pill" data-v="normal">cozy</button>
          <button class="pill" data-v="large">roomy</button>
        </div>
      </div>
      <div class="opt-row">
        <div class="label">fruit</div>
        <div class="pills" data-group="fruits">
          <button class="pill" data-v="single">single</button>
          <button class="pill" data-v="plenty">plenty</button>
        </div>
      </div>
      <div class="opt-row">
        <div class="label">shape</div>
        <div class="pills" data-group="layout">
          <button class="pill" data-v="wide">wide</button>
          <button class="pill" data-v="tall">tall</button>
        </div>
      </div>
    </div>

    <div class="tab-panel hidden" id="tab-style">
      <div class="opt-row">
        <div class="label">world</div>
        <div class="pills" data-group="theme">
          <button class="pill dot" data-v="meadow" data-tip="meadow · the lofi original" style="background:#8fa3e0"></button>
          <button class="pill dot" data-v="midnight" data-tip="midnight · fireflies after dark" style="background:#211f2b"></button>
          <button class="pill dot" data-v="classic" data-tip="classic · retro green" style="background:#aad751"></button>
          <button class="pill dot" data-v="sakura" data-tip="sakura · falling petals" style="background:#e8aec4"></button>
          <button class="pill dot" data-v="tide" data-tip="tide · under the sea" style="background:#5fa8a0"></button>
          <button class="pill dot" data-v="autumn" data-tip="autumn · maple leaves" style="background:#c97b4a"></button>
          <button class="pill dot" data-v="mono" data-tip="mono · quiet snowfall" style="background:#8a8782"></button>
          <button class="pill dot" data-v="storm" data-tip="storm · rain and far-off thunder" style="background:#434a5a"></button>
        </div>
      </div>
      <canvas id="wardrobePreview"></canvas>
      <div class="pills wardrobe-tabs" id="wardrobeTabs">
        <button class="pill active" data-wcat="snake">snake</button>
        <button class="pill" data-wcat="hat">hat</button>
        <button class="pill" data-wcat="trail">trail</button>
        <button class="pill" data-wcat="fruit">fruit</button>
        <button class="pill" data-wcat="munch">munch</button>
        <button class="pill" data-wcat="eyes">eyes</button>
      </div>
      <div class="pills" id="skinPills">
          <button class="pill dot" data-skin="drift" style="background:linear-gradient(135deg,#8fa3e0,#b3a7e6)"></button>
          <button class="pill dot" data-skin="sunset" style="background:linear-gradient(135deg,#f2a36b,#ef8f86)"></button>
          <button class="pill dot" data-skin="dragon" style="background:linear-gradient(135deg,#e87fa8,#c86fc9)"></button>
          <button class="pill dot" data-skin="retro" style="background:linear-gradient(135deg,#58b368,#9ed36a)"></button>
          <button class="pill dot" data-skin="galaxy" style="background:linear-gradient(135deg,#5c6bc0,#9575cd)"></button>
          <button class="pill dot" data-skin="deepsea" style="background:linear-gradient(135deg,#26818e,#4ab3a8)"></button>
          <button class="pill dot" data-skin="ember" style="background:linear-gradient(135deg,#d97742,#a8524a)"></button>
          <button class="pill dot" data-skin="ink" style="background:linear-gradient(135deg,#3d3b38,#6e6b66)"></button>
          <button class="pill dot" data-skin="tempest" style="background:linear-gradient(135deg,#6e7f9e,#9fb0c8)"></button>
          <button class="pill dot" data-skin="honey" style="background:linear-gradient(135deg,#e2b13c,#f0d27a)"></button>
          <button class="pill dot" data-skin="picnic" style="background:repeating-linear-gradient(0deg,rgba(217,76,58,.5) 0 4px,transparent 4px 8px),repeating-linear-gradient(90deg,rgba(217,76,58,.5) 0 4px,transparent 4px 8px),#f7e8d8"></button>
      </div>
      <div class="pills hidden" id="hatPills">
        <button class="pill" data-hat="none">none</button>
        <button class="pill" data-hat="sprout">sprout</button>
        <button class="pill" data-hat="crown">crown</button>
        <button class="pill" data-hat="flower">flower</button>
        <button class="pill" data-hat="chef">chef</button>
        <button class="pill" data-hat="bow">bow</button>
        <button class="pill" data-hat="mushroom">mushroom</button>
        <button class="pill" data-hat="halo">halo</button>
        <button class="pill" data-hat="sunhat">sun hat</button>
      </div>
      <div class="pills hidden" id="trailPills"></div>
      <div class="pills hidden" id="fruitPills"></div>
      <div class="pills hidden" id="burstPills"></div>
      <div class="pills hidden" id="eyePills"></div>
      <div class="opt-row">
        <div class="label">ambience</div>
        <div class="pills" data-group="ambience">
          <button class="pill" data-v="on">on</button>
          <button class="pill" data-v="off">off</button>
        </div>
      </div>
    </div>

    <div class="tab-panel hidden" id="tab-sound">
      <div class="opt-row">
        <div class="label">music source</div>
        <div class="pills" data-group="musicMode">
          <button class="pill" data-v="generated" data-tip="endless generative soundtrack, unique to each world">generated</button>
          <button class="pill" data-v="artists" data-tip="real tracks by real artists, credited on screen">artists</button>
        </div>
      </div>
      <div class="sliders">
        <div class="slider-box">
          <div class="label">music</div>
          <input type="range" id="musicVol" min="0" max="100" value="50">
        </div>
        <div class="slider-box">
          <div class="label">sfx</div>
          <input type="range" id="sfxVol" min="0" max="100" value="80">
        </div>
      </div>
    </div>

    <div class="tab-panel hidden" id="tab-stats"></div>
  </div>

  <div class="overlay" id="ready">
    <h2>ready…</h2>
    <p class="hint">press an <kbd>arrow</kbd> or <kbd>wasd</kbd> to slither</p>
  </div>

  <div class="overlay" id="paused">
    <h2>resting</h2>
    <p class="hint"><kbd>space</kbd> to keep going</p>
    <div class="btn-row">
      <button class="play-btn small" id="resumeBtn">resume</button>
      <button class="ghost-btn" id="pauseMenuBtn">back to menu</button>
    </div>
  </div>

  <div class="overlay" id="gameover">
    <h2 id="goTitle">oh well</h2>
    <div class="big-score" id="goScore">0</div>
    <p class="sub" id="goBest">best 0</p>
    <div class="btn-row">
      <button class="play-btn small" id="againBtn">new run</button>
      <button class="play-btn small" id="raceBtn" data-tip="replay this exact board against a ghost of your best run">race your ghost</button>
    </div>
    <div class="btn-row">
      <button class="ghost-btn" id="copyBtn" data-tip="copy your score + a challenge link, ready to paste anywhere">copy result</button>
      <button class="ghost-btn" id="cardBtn" data-tip="download a score-card image for sharing">save card</button>
      <button class="ghost-btn" id="menuBtn">back to menu</button>
    </div>
  </div>
</div>

<div class="garden-wrap" id="gardenWrap" data-tip="see every flower you've ever grown">
  <canvas id="garden"></canvas>
  <div class="garden-label" id="gardenLabel"></div>
</div>

<p class="hint"><kbd>↑←↓→</kbd> / <kbd>wasd</kbd> move &nbsp;·&nbsp; <kbd>space</kbd> pause &nbsp;·&nbsp; <kbd>h</kbd> hide ui</p>

<div class="toast" id="toast"></div>

<div class="now-playing hidden" id="nowPlaying">
  <a id="npArtist" target="_blank" rel="noopener">
    <span class="np-note">♪</span><span id="npText"></span>
  </a>
  <a class="np-svc hidden" id="npSpotify" target="_blank" rel="noopener" data-tip="open in Spotify">
    <svg width="15" height="15" viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#1DB954"/><path d="M6.4 9.7c3.7-1.1 8-.7 11.1 1.2" stroke="#fff" stroke-width="1.9" stroke-linecap="round" fill="none"/><path d="M7 12.7c3-.9 6.7-.5 9.3 1" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none"/><path d="M7.6 15.5c2.4-.7 5.3-.4 7.4.8" stroke="#fff" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>
  </a>
  <a class="np-svc hidden" id="npApple" target="_blank" rel="noopener" data-tip="open in Apple Music">
    <svg width="15" height="15" viewBox="0 0 24 24"><rect x="1" y="1" width="22" height="22" rx="5.5" fill="#fa2d48"/><path d="M16.8 6.1l-6.4 1.3c-.3.1-.5.3-.5.6v6.3a2.6 2.6 0 1 0 1.2 2.2V10l5-1v3.6a2.6 2.6 0 1 0 1.2 2.2V6.7c0-.4-.3-.7-.5-.6z" fill="#fff"/></svg>
  </a>
</div>

<script src="audio.js?v=13"></script>
<script src="tracks.js?v=11"></script>
<script src="game.js?v=15"></script>
</body>
</html>
